        <rect x="80" y="55" width="60" height="20" rx="10" fill="#00C2A8" opacity="0.8"/>
        <text x="110" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" font-weight="bold">
