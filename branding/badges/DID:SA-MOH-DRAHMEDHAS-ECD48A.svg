                <stop offset="0%" style="stop-color:#0C1E3D;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#00C2A8;stop-opacity:0.8" />
            </linearGradient>
        </defs>

        <!-- Badge background -->
        <rect width="320" height="120" rx="12" fill="url(#grad)" stroke="#00C2A8" stroke-width="2"/>

        <!-- BrainSAIT logo area -->
