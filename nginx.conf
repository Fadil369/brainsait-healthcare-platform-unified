events {
    worker_connections 1024;
}

http {
    upstream brainsait_app {
        server brainsait-app:3000;
    }

    # HIPAA Compliant Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-HIPAA-Compliant "true" always;
    add_header X-Healthcare-Platform "BrainSAIT-v2.0" always;

    server {
        listen 80;
        server_name brainsait.com www.brainsait.com;
        
        # Redirect HTTP to HTTPS
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name brainsait.com www.brainsait.com;

        # SSL Configuration (Cloudflare will handle this)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # Healthcare Platform Routes
        location / {
            proxy_pass http://brainsait_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health Check Endpoint
        location /health {
            proxy_pass http://brainsait_app/api/health;
            access_log off;
        }

        # NPHIES API Routes
        location /api/nphies/ {
            proxy_pass http://brainsait_app;
            proxy_set_header Content-Type "application/fhir+json";
        }

        # FHIR API Routes
        location /api/fhir/ {
            proxy_pass http://brainsait_app;
            proxy_set_header Content-Type "application/fhir+json";
        }
    }
}
